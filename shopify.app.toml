# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "fd1cc82cf99ec4e9a2dadd99ada93b22"
application_url = "https://formease.integritistudio.us"
embedded = true
name = "FormEase"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "write_app_proxy,read_products"

[app_proxy]
url = "https://formease.integritistudio.us/apps/integriti-forms"
subpath = "integriti-forms"
prefix = "apps"

[auth]
redirect_urls = [
  "https://formease.integritistudio.us/api/auth/callback"
]

[webhooks]
api_version = "2025-07"

[[webhooks.subscriptions]]
topics = [ "app/uninstalled", "app_subscriptions/update" ]
uri = "/api/webhooks"

[[webhooks.subscriptions]]
compliance_topics = [ "customers/data_request", "customers/redact", "shop/redact" ]
uri = "/api/webhooks"

[build]
automatically_update_urls_on_dev = true

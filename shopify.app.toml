# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "fd1cc82cf99ec4e9a2dadd99ada93b22"
application_url = "https://forms.integritistudio.us"
embedded = true
name = "integriti-forms"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "write_app_proxy"

[app_proxy]
url = "https://forms.integritistudio.us/apps/integriti-forms"
subpath = "integriti-forms"
prefix = "apps"

[auth]
redirect_urls = [ 
  "https://forms.integritistudio.us/api/auth" 
  ]

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/api/webhooks"

  [[webhooks.subscriptions]]
  topics = [ "app_subscriptions/update" ]
  uri = "/api/webhooks"

[build]
automatically_update_urls_on_dev = true
